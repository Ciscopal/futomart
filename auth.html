<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FutoMart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            padding: 20px;
        }

        .auth-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .auth-logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #008000;
            margin-bottom: 8px;
        }

        .auth-tagline {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .auth-tabs {
            display: flex;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #888;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: white;
            color: #008000;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #008000;
        }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background-color: #008000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .auth-btn:hover {
            background-color: #006600;
        }

        .auth-divider {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 20px 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-message {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }

        .auth-message a {
            color: #008000;
            font-weight: 600;
            text-decoration: none;
        }

        .error-msg {
            background: #fff0f0;
            color: #cc0000;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .success-msg {
            background: #f0fff0;
            color: #008000;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">FutoMart</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Browse</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">

            <div class="auth-logo">FutoMart</div>
            <div class="auth-tagline">Buy & Sell within FUTO Campus</div>

            <!-- TABS -->
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- LOGIN FORM -->
            <div class="auth-form active" id="login-form">
                <div class="error-msg" id="login-error"></div>
                <div class="success-msg" id="login-success"></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>

                <button class="auth-btn" onclick="handleLogin()">Login</button>

                <div class="auth-message">
                    Don't have an account?
                    <a href="#" onclick="switchTab('signup')">Sign Up</a>
                </div>
            </div>

            <!-- SIGNUP FORM -->
            <div class="auth-form" id="signup-form">
                <div class="error-msg" id="signup-error"></div>
                <div class="success-msg" id="signup-success"></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="signup-phone" placeholder="e.g. 08012345678">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm password">
                </div>

                <button class="auth-btn" onclick="handleSignup()">Create Account</button>

                <div class="auth-message">
                    Already have an account?
                    <a href="#" onclick="switchTab('login')">Login</a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(function (t) {
                t.classList.remove('active')
            })
            document.querySelectorAll('.auth-form').forEach(function (f) {
                f.classList.remove('active')
            })
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active')
                document.getElementById('login-form').classList.add('active')
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active')
                document.getElementById('signup-form').classList.add('active')
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value
            const password = document.getElementById('login-password').value
            const error = document.getElementById('login-error')
            const success = document.getElementById('login-success')

            if (!email || !password) {
                error.style.display = 'block'
                error.textContent = 'Please fill in all fields.'
                return
            }

            const { data, error: loginError } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            })

            if (loginError) {
                error.style.display = 'block'
                error.textContent = loginError.message
                return
            }

            error.style.display = 'none'
            success.style.display = 'block'
            success.textContent = 'Login successful! Redirecting...'

            setTimeout(function () {
                window.location.href = 'index.html'
            }, 1500)
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value
            const email = document.getElementById('signup-email').value
            const phone = document.getElementById('signup-phone').value
            const password = document.getElementById('signup-password').value
            const confirm = document.getElementById('signup-confirm').value
            const error = document.getElementById('signup-error')
            const success = document.getElementById('signup-success')

            if (!name || !email || !phone || !password || !confirm) {
                error.style.display = 'block'
                error.textContent = 'Please fill in all fields.'
                return
            }

            if (password.length < 6) {
                error.style.display = 'block'
                error.textContent = 'Password must be at least 6 characters.'
                return
            }

            if (password !== confirm) {
                error.style.display = 'block'
                error.textContent = 'Passwords do not match.'
                return
            }

            const { data, error: signupError } = await supabase.auth.signUp({
                email: email,
                password: password
            })

            if (signupError) {
                error.style.display = 'block'
                error.textContent = signupError.message
                return
            }

            error.style.display = 'none'
            success.style.display = 'block'
            success.textContent = 'Account created successfully! Redirecting...'

            if (data.user) {
                try {
                    await supabase.from('profiles').insert({
                        id: data.user.id,
                        full_name: name,
                        phone: phone
                    })
                } catch (e) {
                    console.log('Profile insert failed', e)
                }
            }

            setTimeout(function () {
                window.location.href = 'index.html'
            }, 1500)
        }
    </script>

    <a href="https://wa.me/2349034275126?text=Hi, I need help with FutoMart" class="whatsapp-float" target="_blank">
        💬 Support
    </a>
</body>

</html>
